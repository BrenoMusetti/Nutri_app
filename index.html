<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Nutrição">
  <meta name="theme-color" content="#0f0f0f">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png">
  <link rel="apple-touch-icon" sizes="167x167" href="icons/icon-167.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png">
  <title>Nutrição</title>
  <style>
    :root {
      --bg:      #0f0f0f;
      --bg2:     #1a1a1a;
      --bg3:     #242424;
      --bg4:     #2e2e2e;
      --border:  rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.15);
      --text:    #f0f0f0;
      --text2:   #a0a0a0;
      --text3:   #555;
      --green:        #4ade80;
      --green-dim:    rgba(74,222,128,0.10);
      --green-border: rgba(74,222,128,0.28);
      --blue:         #60a5fa;
      --orange:       #fb923c;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    /* iOS: não usar overflow:hidden no body — quebra eventos de touch */
    html { background: var(--bg); }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      /* safe areas para iPhone com notch/Dynamic Island */
      padding-top: env(safe-area-inset-top, 0px);
    }

    /* ── TOP BAR ── */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px 10px;
      background: var(--bg2); border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .topbar-title { font-size: 17px; font-weight: 700; letter-spacing: -0.4px; }
    .topbar-date  { font-size: 11px; color: var(--text3); margin-top: 2px; }
    .reset-btn {
      padding: 7px 13px; border-radius: 8px;
      border: 1px solid var(--border2); background: transparent;
      color: var(--text2); font-size: 12px;
      /* cursor e touch-action explícitos para iOS */
      cursor: pointer; touch-action: manipulation;
    }

    /* ── DAY CHIPS ── */
    .day-bar {
      display: flex; gap: 8px; padding: 10px 16px;
      background: var(--bg2); border-bottom: 1px solid var(--border);
      overflow-x: auto; flex-shrink: 0;
      -webkit-overflow-scrolling: touch;
    }
    .day-bar::-webkit-scrollbar { display: none; }
    .day-chip {
      white-space: nowrap; padding: 7px 16px; border-radius: 99px;
      border: 1px solid var(--border2); background: transparent;
      color: var(--text2); font-size: 13px;
      cursor: pointer; touch-action: manipulation;
      /* min-height garante área de toque adequada no iOS */
      min-height: 36px; display: inline-flex; align-items: center;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .day-chip.active {
      background: var(--green-dim); color: var(--green);
      border-color: var(--green-border); font-weight: 600;
    }

    /* ── SCROLL ── */
    .scroll-area {
      flex: 1; overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 14px 16px 80px; /* 80px para não ficar sob a nav bar */
    }

    /* ── MACRO RING ── */
    .macro-summary {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 16px; padding: 16px; margin-bottom: 14px;
    }
    .macro-top { display: flex; align-items: center; gap: 14px; margin-bottom: 12px; }
    .ring-wrap { position: relative; width: 88px; height: 88px; flex-shrink: 0; }
    .ring-svg  { transform: rotate(-90deg); }
    .ring-track { fill: none; stroke: var(--bg4); stroke-width: 8; }
    .ring-fill  {
      fill: none; stroke-width: 8; stroke-linecap: round; stroke: var(--green);
      stroke-dasharray: 226; stroke-dashoffset: 226;
      transition: stroke-dashoffset 0.5s ease, stroke 0.3s;
    }
    .ring-center {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .ring-kcal  { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
    .ring-label { font-size: 9px; color: var(--text2); }
    .ring-stats { flex: 1; display: flex; flex-direction: column; gap: 8px; }
    .mrow { display: flex; flex-direction: column; gap: 3px; }
    .mrow-head { display: flex; justify-content: space-between; font-size: 12px; }
    .mrow-name { color: var(--text2); }
    .mrow-val  { font-weight: 600; color: var(--text); }
    .mrow-val span { color: var(--text3); font-weight: 400; }
    .bar-bg   { height: 5px; background: var(--bg4); border-radius: 99px; overflow: hidden; }
    .bar-fill { height: 5px; border-radius: 99px; transition: width 0.5s ease; }
    .bar-p { background: var(--green); }
    .bar-c { background: var(--blue); }
    .bar-g { background: var(--orange); }
    .macro-footer {
      display: flex; justify-content: space-between;
      font-size: 12px; color: var(--text2);
      padding-top: 10px; border-top: 1px solid var(--border);
    }
    .macro-footer strong { color: var(--text); }

    /* ── MEAL CARDS ── */
    .meals { display: flex; flex-direction: column; gap: 10px; }

    .meal-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 14px; overflow: hidden;
    }
    .meal-card.accent-blue  { border-left: 3px solid var(--blue); }
    .meal-card.accent-green { border-left: 3px solid var(--green); }
    .meal-card.done { border-color: var(--green-border); }
    .meal-card.done .meal-head { background: var(--green-dim); }

    /* meal-head é a área clicável principal — deve ser um elemento simples */
    .meal-head {
      display: flex; align-items: center; gap: 10px;
      padding: 14px; cursor: pointer; touch-action: manipulation;
      -webkit-user-select: none; user-select: none;
    }

    /* CHECK: área grande de toque, sem <button> aninhado que conflita no iOS */
    .check-circle {
      width: 28px; height: 28px; border-radius: 50%;
      border: 2px solid var(--border2); background: transparent;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-size: 13px; color: transparent;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
      /* touch-action manipulation = sem delay de 300ms no iOS */
      touch-action: manipulation;
    }
    .meal-card.done .check-circle {
      background: var(--green); border-color: var(--green); color: #000;
    }

    .meal-icon { font-size: 22px; width: 28px; text-align: center; pointer-events: none; }
    .meal-info { flex: 1; min-width: 0; pointer-events: none; }
    .meal-title { font-size: 14px; font-weight: 600; }
    .meal-time  { font-size: 11px; color: var(--text3); margin-top: 1px; }
    .meal-kcal  {
      font-size: 12px; font-weight: 700; color: var(--green);
      background: var(--green-dim); padding: 4px 9px;
      border-radius: 99px; white-space: nowrap; pointer-events: none;
    }
    .expand-arrow {
      font-size: 10px; color: var(--text3);
      transition: transform 0.2s; pointer-events: none;
    }
    .meal-card.open .expand-arrow { transform: rotate(180deg); }

    .meal-body { display: none; border-top: 1px solid var(--border); }
    .meal-card.open .meal-body { display: block; }

    .food-list { padding: 10px 14px; }
    .food-item { padding: 8px 0; border-bottom: 1px solid var(--border); }
    .food-item:last-child { border-bottom: none; }
    .food-main { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
    .food-name { font-size: 13px; font-weight: 500; color: var(--text); }
    .food-qty  { font-size: 12px; font-weight: 600; color: var(--blue); white-space: nowrap; }
    .food-alts { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 5px; }
    .alt-chip  {
      font-size: 10px; background: var(--bg3);
      border: 1px solid var(--border); border-radius: 99px;
      padding: 2px 7px; color: var(--text2);
    }

    .meal-macros {
      display: flex; padding: 10px 14px;
      border-top: 1px solid var(--border);
    }
    .mm { flex: 1; text-align: center; }
    .mm-val   { font-size: 15px; font-weight: 700; }
    .mm-label { font-size: 9px; color: var(--text3); margin-top: 1px; }
    .mm.p .mm-val { color: var(--green); }
    .mm.c .mm-val { color: var(--blue); }
    .mm.g .mm-val { color: var(--orange); }
    .mm.k .mm-val { color: var(--text2); }

    /* RECEITA BTN */
    .receita-row { padding: 0 14px 12px; }
    .receita-btn {
      width: 100%; min-height: 42px;
      border-radius: 10px; border: 1px solid var(--border2);
      background: var(--bg3); color: var(--text2);
      font-size: 13px; cursor: pointer; touch-action: manipulation;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .receita-btn:active { background: var(--bg4); }

    /* ── BOTTOM NAV ── */
    .bottom-nav {
      display: flex; background: var(--bg2);
      border-top: 1px solid var(--border);
      position: fixed; bottom: 0; left: 0; right: 0;
      /* safe area para iPhone com home indicator */
      padding-bottom: env(safe-area-inset-bottom, 0px);
      z-index: 50;
    }
    .nav-btn {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 10px 0; min-height: 52px;
      background: transparent; border: none;
      color: var(--text3); font-size: 10px; gap: 3px;
      cursor: pointer; touch-action: manipulation;
      transition: color 0.15s;
    }
    .nav-icon { font-size: 22px; }
    .nav-btn.active { color: var(--green); }

    /* ── HISTÓRICO ── */
    .hist-list { display: flex; flex-direction: column; gap: 10px; }
    .hist-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 14px; padding: 14px;
    }
    .hist-head {
      display: flex; justify-content: space-between;
      align-items: flex-start; margin-bottom: 12px;
    }
    .hist-date  { font-size: 14px; font-weight: 600; }
    .hist-badge {
      font-size: 11px; padding: 3px 9px; border-radius: 99px;
      border: 1px solid var(--border2); color: var(--text2);
    }
    .hist-kcal      { font-size: 18px; font-weight: 700; color: var(--green); }
    .hist-kcal-goal { font-size: 11px; color: var(--text3); }
    .hist-bars { display: flex; flex-direction: column; gap: 6px; margin-top: 10px; }
    .hbar-row { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--text3); }
    .hbar-label { width: 22px; }
    .hbar-bg  { flex: 1; height: 4px; background: var(--bg4); border-radius: 99px; overflow: hidden; }
    .hbar-fill { height: 4px; border-radius: 99px; }
    .hbar-val  { width: 34px; text-align: right; color: var(--text2); }
    .hist-sub  { font-size: 11px; color: var(--text3); margin-top: 6px; }
    .empty-state {
      text-align: center; padding: 48px 24px;
      color: var(--text3); font-size: 14px; line-height: 1.7;
    }

    /* ── MODAL ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.75); z-index: 200;
      align-items: flex-end; justify-content: center;
      /* touch-action none: impede scroll do fundo quando modal aberto */
      touch-action: none;
    }
    .modal-overlay.open { display: flex; }
    .modal-sheet {
      background: var(--bg2); border-radius: 20px 20px 0 0;
      width: 100%; max-width: 600px;
      max-height: 88dvh; overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: env(safe-area-inset-bottom, 16px);
      animation: slideUp 0.22s ease;
      /* touch-action auto: o sheet em si pode fazer scroll */
      touch-action: auto;
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }
    .modal-handle {
      width: 36px; height: 4px; background: var(--bg4);
      border-radius: 99px; margin: 12px auto 0;
    }
    .modal-header {
      display: flex; justify-content: space-between; align-items: flex-start;
      padding: 16px 20px 10px;
    }
    .modal-title { font-size: 18px; font-weight: 700; line-height: 1.3; }
    .modal-close {
      width: 30px; height: 30px; border-radius: 50%;
      background: var(--bg4); border: none;
      color: var(--text2); font-size: 14px;
      cursor: pointer; touch-action: manipulation;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-left: 12px;
    }
    .modal-desc   { font-size: 13px; color: var(--text2); padding: 0 20px 14px; line-height: 1.5; }
    .modal-section {
      font-size: 10px; font-weight: 700; letter-spacing: 1px;
      text-transform: uppercase; color: var(--text3);
      padding: 0 20px 8px; border-top: 1px solid var(--border); padding-top: 12px;
    }
    .modal-ingr-list { list-style: none; margin-bottom: 4px; }
    .modal-ingr-item {
      display: flex; justify-content: space-between;
      padding: 9px 20px; border-bottom: 1px solid var(--border); font-size: 13px;
    }
    .modal-ingr-item:last-child { border-bottom: none; }
    .ingr-qty { color: var(--blue); font-weight: 600; }
    .modal-step-list { list-style: none; margin-bottom: 4px; }
    .modal-step {
      display: flex; gap: 12px;
      padding: 12px 20px; border-bottom: 1px solid var(--border);
    }
    .modal-step:last-child { border-bottom: none; }
    .step-num {
      width: 24px; height: 24px; border-radius: 50%;
      background: var(--green-dim); border: 1px solid var(--green-border);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: var(--green); flex-shrink: 0;
    }
    .step-text { font-size: 13px; color: var(--text2); line-height: 1.55; }
    .modal-note {
      margin: 12px 20px 0;
      background: var(--bg3); border-left: 3px solid var(--green);
      border-radius: 0 8px 8px 0;
      padding: 10px 14px; font-size: 12px; color: var(--text2); line-height: 1.6;
    }
  </style>
</head>
<body>
<div id="app">

  <div class="topbar">
    <div>
      <div class="topbar-title">🥗 Nutrição</div>
      <div class="topbar-date" id="topbar-date"></div>
    </div>
    <button class="reset-btn" id="btn-reset">↺ Reiniciar</button>
  </div>

  <div class="day-bar">
    <button class="day-chip" id="chip-treino"   data-day="treino">🏋️ Treino</button>
    <button class="day-chip" id="chip-tenis"    data-day="tenis">🎾 Tênis</button>
    <button class="day-chip" id="chip-descanso" data-day="descanso">😴 Descanso</button>
  </div>

  <div class="scroll-area" id="scroll-area">
    <div id="view-hoje">
      <div class="macro-summary">
        <div class="macro-top">
          <div class="ring-wrap">
            <svg class="ring-svg" width="88" height="88" viewBox="0 0 88 88">
              <circle class="ring-track" cx="44" cy="44" r="36"/>
              <circle class="ring-fill" id="ring-fill" cx="44" cy="44" r="36"/>
            </svg>
            <div class="ring-center">
              <div class="ring-kcal" id="kcal-num">0</div>
              <div class="ring-label">kcal</div>
            </div>
          </div>
          <div class="ring-stats">
            <div class="mrow">
              <div class="mrow-head">
                <span class="mrow-name">🟢 Proteína</span>
                <span class="mrow-val" id="p-val">0g</span>
              </div>
              <div class="bar-bg"><div class="bar-fill bar-p" id="bar-p" style="width:0%"></div></div>
            </div>
            <div class="mrow">
              <div class="mrow-head">
                <span class="mrow-name">🔵 Carbs</span>
                <span class="mrow-val" id="c-val">0g</span>
              </div>
              <div class="bar-bg"><div class="bar-fill bar-c" id="bar-c" style="width:0%"></div></div>
            </div>
            <div class="mrow">
              <div class="mrow-head">
                <span class="mrow-name">🟠 Gordura</span>
                <span class="mrow-val" id="g-val">0g</span>
              </div>
              <div class="bar-bg"><div class="bar-fill bar-g" id="bar-g" style="width:0%"></div></div>
            </div>
          </div>
        </div>
        <div class="macro-footer">
          <span>Meta: <strong id="kcal-goal-lbl">2.650</strong> kcal</span>
          <span>Restam: <strong id="kcal-left-lbl">2.650</strong> kcal</span>
        </div>
      </div>
      <div class="meals" id="meals-list"></div>
    </div>

    <div id="view-hist" style="display:none">
      <div class="hist-list" id="hist-list"></div>
    </div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-btn active" id="nav-hoje" data-view="hoje">
      <span class="nav-icon">📋</span>Hoje
    </button>
    <button class="nav-btn" id="nav-hist" data-view="hist">
      <span class="nav-icon">📊</span>Histórico
    </button>
  </nav>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-sheet" id="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title" id="modal-title"></div>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="modal-desc" id="modal-desc"></div>
    <div class="modal-section">Ingredientes</div>
    <ul  class="modal-ingr-list" id="modal-ingr"></ul>
    <div class="modal-section">Modo de preparo</div>
    <ul  class="modal-step-list" id="modal-steps"></ul>
    <div class="modal-note" id="modal-note"></div>
  </div>
</div>

/* ─── STATE ─────────────────────────────────────────────────── */
var dayType = 'treino';
var checked = {};
var history = [];
var currentView = 'hoje';

function todayStr() {
  return new Date().toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit', year:'numeric' });
}

function loadState() {
  try {
    var d = JSON.parse(localStorage.getItem('nutri_' + todayStr()) || '{}');
    if (d.dayType) dayType = d.dayType;
    if (d.checked) checked = d.checked;
    var h = JSON.parse(localStorage.getItem('nutri_history') || '[]');
    if (Array.isArray(h)) history = h;
  } catch(e) {}
}

function saveState() {
  localStorage.setItem('nutri_' + todayStr(), JSON.stringify({ dayType:dayType, checked:checked }));
  var meals = MEALS[dayType];
  var goals = GOALS[dayType];
  var done  = meals.filter(function(m){ return checked[m.id]; });
  var entry = {
    date: todayStr(), dayType: dayType,
    checked: JSON.parse(JSON.stringify(checked)),
    kcal: done.reduce(function(a,m){ return a+m.kcal; },0),
    p:    done.reduce(function(a,m){ return a+m.p; },0),
    c:    done.reduce(function(a,m){ return a+m.c; },0),
    g:    done.reduce(function(a,m){ return a+m.g; },0),
    goal: goals
  };
  var idx = history.findIndex(function(h){ return h.date === entry.date; });
  if (idx >= 0) history[idx] = entry; else history.unshift(entry);
  if (history.length > 30) history.length = 30;
  localStorage.setItem('nutri_history', JSON.stringify(history));
}

/* ─── RENDER ─────────────────────────────────────────────────── */
function render() {
  var meals = MEALS[dayType];
  var goals = GOALS[dayType];
  var done  = meals.filter(function(m){ return checked[m.id]; });
  var totK = done.reduce(function(a,m){ return a+m.kcal; },0);
  var totP = done.reduce(function(a,m){ return a+m.p; },0);
  var totC = done.reduce(function(a,m){ return a+m.c; },0);
  var totG = done.reduce(function(a,m){ return a+m.g; },0);

  /* anel de calorias */
  var circ = 2 * Math.PI * 36;
  var pct  = Math.min(totK / goals.kcal, 1);
  var fill = document.getElementById('ring-fill');
  fill.style.strokeDasharray  = circ.toFixed(1);
  fill.style.strokeDashoffset = (circ - pct * circ).toFixed(1);
  fill.style.stroke = pct >= 1 ? '#f87171' : pct >= 0.85 ? '#facc15' : '#4ade80';

  document.getElementById('kcal-num').textContent      = totK;
  document.getElementById('kcal-goal-lbl').textContent = goals.kcal.toLocaleString('pt-BR');
  document.getElementById('kcal-left-lbl').textContent = Math.max(0, goals.kcal - totK).toLocaleString('pt-BR');

  document.getElementById('p-val').innerHTML = totP + 'g <span>/ ' + goals.p + 'g</span>';
  document.getElementById('c-val').innerHTML = totC + 'g <span>/ ' + goals.c + 'g</span>';
  document.getElementById('g-val').innerHTML = totG + 'g <span>/ ' + goals.g + 'g</span>';
  document.getElementById('bar-p').style.width = Math.min(100, totP/goals.p*100) + '%';
  document.getElementById('bar-c').style.width = Math.min(100, totC/goals.c*100) + '%';
  document.getElementById('bar-g').style.width = Math.min(100, totG/goals.g*100) + '%';

  document.getElementById('topbar-date').textContent = todayStr();

  /* chips */
  ['treino','tenis','descanso'].forEach(function(t) {
    document.getElementById('chip-'+t).classList.toggle('active', t === dayType);
  });

  /* refeições */
  var list = document.getElementById('meals-list');
  list.innerHTML = '';
  meals.forEach(function(meal) {
    var isDone = !!checked[meal.id];

    /* alimentos */
    var foodsHtml = meal.foods.map(function(f) {
      var alts = (f.alts || []).map(function(a) {
        return '<span class="alt-chip">'+a+'</span>';
      }).join('');
      return '<div class="food-item">' +
        '<div class="food-main">' +
          '<span class="food-name">'+f.n+'</span>' +
          '<span class="food-qty">'+f.q+'</span>' +
        '</div>' +
        (alts ? '<div class="food-alts">'+alts+'</div>' : '') +
      '</div>';
    }).join('');

    /* botão receita */
    var recHtml = meal.receita
      ? '<div class="receita-row">' +
          '<button class="receita-btn" data-action="receita" data-key="'+meal.receita+'">'+
            '📖 '+(meal.receitaLabel||'Ver receita')+
          '</button>' +
        '</div>'
      : '';

    var card = document.createElement('div');
    card.className = 'meal-card' +
      (meal.accent ? ' accent-'+meal.accent : '') +
      (isDone ? ' done' : '');
    card.dataset.mealId = meal.id;

    card.innerHTML =
      '<div class="meal-head" data-action="expand" data-meal="'+meal.id+'">' +
        '<div class="check-circle" data-action="check" data-meal="'+meal.id+'">' +
          (isDone ? '✓' : '') +
        '</div>' +
        '<div class="meal-icon">'+meal.icon+'</div>' +
        '<div class="meal-info">' +
          '<div class="meal-title">'+meal.title+'</div>' +
          '<div class="meal-time">'+meal.time+'</div>' +
        '</div>' +
        '<div class="meal-kcal">'+meal.kcal+' kcal</div>' +
        '<div class="expand-arrow">▼</div>' +
      '</div>' +
      '<div class="meal-body">' +
        '<div class="food-list">'+foodsHtml+'</div>' +
        '<div class="meal-macros">' +
          '<div class="mm p"><div class="mm-val">'+meal.p+'g</div><div class="mm-label">Proteína</div></div>' +
          '<div class="mm c"><div class="mm-val">'+meal.c+'g</div><div class="mm-label">Carbs</div></div>' +
          '<div class="mm g"><div class="mm-val">'+meal.g+'g</div><div class="mm-label">Gordura</div></div>' +
          '<div class="mm k"><div class="mm-val">'+meal.kcal+'</div><div class="mm-label">kcal</div></div>' +
        '</div>' +
        recHtml +
      '</div>';

    list.appendChild(card);
  });
}

function renderHistory() {
  var el = document.getElementById('hist-list');
  if (!history.length) {
    el.innerHTML = '<div class="empty-state">Nenhum dia registrado ainda.<br>Marque suas refeições de hoje para começar.</div>';
    return;
  }
  var labels = { treino:'🏋️ Treino', tenis:'🎾 Tênis', descanso:'😴 Descanso' };
  el.innerHTML = history.map(function(h) {
    var meals = MEALS[h.dayType] || MEALS.treino;
    var done  = Object.keys(h.checked||{}).filter(function(k){ return h.checked[k]; }).length;
    var pPct = Math.min(100, h.p/h.goal.p*100).toFixed(0);
    var cPct = Math.min(100, h.c/h.goal.c*100).toFixed(0);
    var gPct = Math.min(100, h.g/h.goal.g*100).toFixed(0);
    return '<div class="hist-card">' +
      '<div class="hist-head">' +
        '<div>' +
          '<div class="hist-date">'+h.date+'</div>' +
          '<div class="hist-sub">'+done+'/'+meals.length+' refeições</div>' +
        '</div>' +
        '<div style="text-align:right">' +
          '<div class="hist-kcal">'+h.kcal+'</div>' +
          '<div class="hist-kcal-goal">/ '+h.goal.kcal+' kcal</div>' +
          '<span class="hist-badge">'+(labels[h.dayType]||h.dayType)+'</span>' +
        '</div>' +
      '</div>' +
      '<div class="hist-bars">' +
        '<div class="hbar-row"><span class="hbar-label">🟢P</span><div class="hbar-bg"><div class="hbar-fill bar-p" style="width:'+pPct+'%"></div></div><span class="hbar-val">'+h.p+'g</span></div>' +
        '<div class="hbar-row"><span class="hbar-label">🔵C</span><div class="hbar-bg"><div class="hbar-fill bar-c" style="width:'+cPct+'%"></div></div><span class="hbar-val">'+h.c+'g</span></div>' +
        '<div class="hbar-row"><span class="hbar-label">🟠G</span><div class="hbar-bg"><div class="hbar-fill bar-g" style="width:'+gPct+'%"></div></div><span class="hbar-val">'+h.g+'g</span></div>' +
      '</div>' +
    '</div>';
  }).join('');
}

/* ─── EVENT DELEGATION ──────────────────────────────────────── */
/*
  Toda interação passa por um único listener no document.
  Isso evita os bugs de iOS com onclick em elementos gerados dinamicamente
  e elimina conflitos entre elementos aninhados.
*/
document.addEventListener('click', function(e) {
  var t = e.target;

  /* --- botão de check (bolinha) --- */
  /* procura o elemento com data-action="check" subindo a árvore */
  var checkEl = closest(t, '[data-action="check"]');
  if (checkEl) {
    var mealId = checkEl.dataset.meal;
    checked[mealId] = !checked[mealId];
    saveState();
    render();
    return;
  }

  /* --- expandir card --- */
  var expandEl = closest(t, '[data-action="expand"]');
  if (expandEl) {
    var mid = expandEl.dataset.meal;
    var card = document.querySelector('[data-meal-id="'+mid+'"]');
    /* fallback: sobe até o .meal-card */
    if (!card) card = closest(expandEl, '.meal-card');
    if (card) card.classList.toggle('open');
    return;
  }

  /* --- botão receita --- */
  var recBtn = closest(t, '[data-action="receita"]');
  if (recBtn) {
    openReceita(recBtn.dataset.key);
    return;
  }

  /* --- chips de dia --- */
  var chip = closest(t, '[data-day]');
  if (chip) {
    dayType = chip.dataset.day;
    checked = {};
    saveState();
    render();
    return;
  }

  /* --- nav inferior --- */
  var navBtn = closest(t, '[data-view]');
  if (navBtn) {
    showView(navBtn.dataset.view);
    return;
  }

  /* --- reset --- */
  if (t.id === 'btn-reset' || closest(t, '#btn-reset')) {
    checked = {};
    saveState();
    render();
    return;
  }

  /* --- fechar modal --- */
  if (t.id === 'modal-close' || closest(t, '#modal-close')) {
    closeModal();
    return;
  }
  if (t.id === 'modal-overlay') {
    closeModal();
    return;
  }
});

/* helper: Element.closest() polyfill para iOS antigo */
function closest(el, sel) {
  while (el && el !== document) {
    if (el.matches && el.matches(sel)) return el;
    el = el.parentNode;
  }
  return null;
}

/* ─── AÇÕES ─────────────────────────────────────────────────── */
function showView(v) {
  currentView = v;
  document.getElementById('view-hoje').style.display = v === 'hoje' ? 'block' : 'none';
  document.getElementById('view-hist').style.display = v === 'hist'  ? 'block' : 'none';
  document.getElementById('nav-hoje').classList.toggle('active', v === 'hoje');
  document.getElementById('nav-hist').classList.toggle('active',  v === 'hist');
  document.getElementById('scroll-area').scrollTop = 0;
  if (v === 'hist') renderHistory();
}

function openReceita(key) {
  var r = RECEITAS[key];
  if (!r) return;
  document.getElementById('modal-title').textContent = r.title;
  document.getElementById('modal-desc').textContent  = r.desc;
  document.getElementById('modal-ingr').innerHTML = r.ingr.map(function(i) {
    return '<li class="modal-ingr-item"><span>'+i.n+'</span><span class="ingr-qty">'+i.q+'</span></li>';
  }).join('');
  document.getElementById('modal-steps').innerHTML = r.steps.map(function(s,i) {
    return '<li class="modal-step"><div class="step-num">'+(i+1)+'</div><div class="step-text">'+s+'</div></li>';
  }).join('');
  document.getElementById('modal-note').innerHTML = r.note.replace(/\n/g,'<br>');
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}
